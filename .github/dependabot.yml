version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 10
    groups:
      rust-patch-updates:
        update-types:
          - patch
    commit-message:
      prefix: "deps(cargo)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(actions)"
